spring:
  application:
    name: ticketflow
  profiles:
    default: dev
  jpa:
    open-in-view: false
  flyway:
    enabled: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}

ticketflow:
  security:
    allowed-origins: ${ALLOWED_ORIGINS:*}
    jwt-secret: ${JWT_SECRET:}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  alerts:
    async:
      core-pool-size: ${ALERT_CORE_POOL_SIZE:2}
      max-pool-size: ${ALERT_MAX_POOL_SIZE:2}
      queue-capacity: ${ALERT_QUEUE_CAPACITY:50}
  dashboard:
    cache-ttl-seconds: ${DASHBOARD_CACHE_TTL_SECONDS:30}
