spring:
  datasource:
    url: jdbc:h2:mem:ticketflow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 3
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: never

management:
  health:
    db:
      enabled: true

ticketflow:
  security:
    jwt-secret: dev-only-ticketflow-secret-change-me
