<section class="auth-shell">
  <div class="auth-scene">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-mark">TF</span>
        <span>TicketFlow</span>
      </div>
      <h1 class="page-title" style="margin-top: 24px;">Sign in</h1>
      <p class="page-copy">Access incidents, alerts, and SLA analytics.</p>

      <form class="form" [formGroup]="form" (ngSubmit)="submit()">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" class="control" type="email" autocomplete="email" formControlName="email">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" class="control" type="password" autocomplete="current-password" formControlName="password">
        </div>

        <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button class="button" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>

      <p class="page-copy" style="margin-top: 18px;">
        Need an account? <a class="link" routerLink="/register">Create one</a>
      </p>
    </div>

    <aside class="auth-preview" aria-hidden="true">
      <div class="auth-preview-header">
        <span>Live queue</span>
        <strong>3 SLA risks</strong>
      </div>
      <div class="auth-preview-grid">
        <div>
          <strong>42</strong>
          <span>Total</span>
        </div>
        <div>
          <strong>9</strong>
          <span>Open</span>
        </div>
      </div>
      <div class="auth-preview-ticket urgent">
        <span>Urgent</span>
        <strong>Checkout API latency crossing SLA</strong>
      </div>
      <div class="auth-preview-ticket">
        <span>High</span>
        <strong>Customer portal session failures</strong>
      </div>
    </aside>
  </div>
</section>
